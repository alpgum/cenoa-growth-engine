<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENOA GROWTH ENGINE — Architecture</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--surface:#f8f9fa;--surface2:#f0f1f3;--border:#e0e0e0;--accent:#00b85c;--accent-dim:rgba(0,184,92,.08);--accent-glow:rgba(0,184,92,.2);--text:#1a1a1a;--text-dim:#666;--text-bright:#000;--blue:#60a5fa;--blue-dim:rgba(59,130,246,.15);--green:#34d399;--green-dim:rgba(52,211,153,.12);--purple:#c084fc;--purple-dim:rgba(168,85,247,.15);--orange:#fbbf24;--orange-dim:rgba(251,191,36,.12);--gray:#64748b;--gray-dim:rgba(100,116,139,.12)}
body{background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;overflow-x:hidden;min-height:100vh}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f5f5f5}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

header{border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);height:54px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.header-brand{display:flex;align-items:center;gap:.5rem;font-size:.82rem;font-weight:600;letter-spacing:.12em;color:var(--text-dim)}
.header-brand span{color:var(--accent)}
.header-pulse{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;margin-right:.4rem;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 0 6px transparent}}
.header-nav{display:flex;gap:1.2rem;align-items:center}
.header-nav a{font-size:.7rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;font-weight:600;transition:color .2s}
.header-nav a:hover,.header-nav a.active{color:var(--accent)}

.container{max-width:1400px;margin:0 auto;padding:2rem}

.page-title{text-align:center;padding:3rem 0 1rem}
.page-title h1{font-size:2rem;font-weight:800;letter-spacing:.1em}
.page-title h1 .accent{background:linear-gradient(135deg,var(--accent),#00cc6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-title p{color:var(--text-dim);font-size:.9rem;margin-top:.4rem;letter-spacing:.06em}

/* Legend */
.legend{display:flex;justify-content:center;gap:2rem;margin:1.5rem 0 2.5rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-dot.src{background:var(--blue)}
.legend-dot.proc{background:var(--green)}
.legend-dot.orch{background:var(--orange)}
.legend-dot.out{background:var(--purple)}

/* Architecture SVG */
.arch-wrap{overflow-x:auto;padding:1rem 0}
.arch-svg{display:block;margin:0 auto}

/* SVG styles */
.layer-label{font-family:'SF Pro Display',-apple-system,sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.box-rect{rx:8;ry:8;stroke-width:1.5}
.box-label{font-family:'SF Pro Display',-apple-system,sans-serif;font-size:11.5px;font-weight:600;fill:#fff}
.box-sub{font-family:'SF Pro Display',-apple-system,sans-serif;font-size:9.5px;fill:#999}
.box-icon{font-size:14px}
.flow-arrow{stroke-width:1.5;fill:none;marker-end:url(#arrowhead)}
.flow-arrow-dim{stroke-width:1;fill:none;stroke-dasharray:4,3;opacity:.4}
.orch-glow{filter:url(#glow)}

/* Footer */
.footer{text-align:center;padding:3rem 0 2rem;color:#999;font-size:.7rem;letter-spacing:.1em}

@media(max-width:900px){
  .container{padding:1rem}
  .header-nav{gap:.6rem}
  .header-nav a{font-size:.6rem}
  .page-title h1{font-size:1.4rem}
}
</style>
</head>
